version: '3.8'

services:
  uar-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=false
      - LOG_LEVEL=info
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_ANONYMOUS=10
      - RATE_LIMIT_AUTHENTICATED=100
      - RATE_LIMIT_WINDOW=60
      - UAR_HIERARCHICAL_EXECUTION=false
      - REDIS_URL=redis://redis:6379/0
      - ALM_SERVICE_URL=http://alm-service:5001/api/v1
    volumes:
      - ./runs:/var/lib/uar/runs
      - ./logs:/var/log/uar
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - uar-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - uar-api
    restart: unless-stopped
    networks:
      - uar-network

  # Redis for shared rate limiting and caching (required in production)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - uar-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Observability stack
  prometheus:
    image: prom/prometheus:v2.51
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
    ports:
      - "9090:9090"
    depends_on:
      - uar-api
    networks:
      - uar-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - uar-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - uar-network
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24
    volumes:
      - ./observability/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - uar-network
    restart: unless-stopped

  # Structured log aggregation
  loki:
    image: grafana/loki:2.9
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./observability/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - uar-network
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  uar-network:
    driver: bridge

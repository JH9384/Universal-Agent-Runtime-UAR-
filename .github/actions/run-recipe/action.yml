name: 'UAR Run Recipe'
description: 'Execute a UAR recipe as a GitHub Action'
author: 'UAR Team'
branding:
  icon: 'zap'
  color: 'green'

inputs:
  server:
    description: 'UAR API server URL'
    required: false
    default: 'https://api.universalagent.io'
  api-key:
    description: 'UAR API key (store in GitHub Secrets)'
    required: true
  recipe:
    description: 'Recipe ID to execute'
    required: true
  goal:
    description: 'Goal text to pass to the recipe'
    required: true
  input-path:
    description: 'Optional input path or file to upload'
    required: false
    default: ''
  timeout:
    description: 'Maximum seconds to wait for completion'
    required: false
    default: '300'
  wait:
    description: 'Wait for run completion before exiting'
    required: false
    default: 'true'

outputs:
  run-id:
    description: 'The UAR run ID'
  status:
    description: 'Final run status (completed / failed / unknown)'
  result-json:
    description: 'Full JSON result from the run'

runs:
  using: 'composite'
  steps:
    - name: Submit UAR recipe
      id: submit
      shell: bash
      run: |
        set -euo pipefail

        SERVER="${{ inputs.server }}"
        API_KEY="${{ inputs.api-key }}"
        RECIPE="${{ inputs.recipe }}"
        GOAL="${{ inputs.goal }}"
        INPUT_PATH="${{ inputs.input-path }}"
        TIMEOUT="${{ inputs.timeout }}"
        WAIT="${{ inputs.wait }}"

        # Build payload
        PAYLOAD=$(jq -n \
          --arg goal "$GOAL" \
          --arg recipe "$RECIPE" \
          '{goal: $goal, recipe_id: $recipe, skills: []}')

        if [[ -n "$INPUT_PATH" && -e "$INPUT_PATH" ]]; then
          # Upload file and include path in metadata
          echo "::notice::Uploading input: $INPUT_PATH"
          UPLOAD=$(curl -s -X POST \
            -H "Authorization: Bearer $API_KEY" \
            -F "file=@$INPUT_PATH" \
            "$SERVER/api/uar/upload" || true)
          echo "upload=$UPLOAD" >> "$GITHUB_OUTPUT"
        fi

        # Submit run
        echo "::notice::Submitting recipe '$RECIPE' to $SERVER"
        RESPONSE=$(curl -s -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $API_KEY" \
          -d "$PAYLOAD" \
          "$SERVER/api/uar/run")

        RUN_ID=$(echo "$RESPONSE" | jq -r '.run_id // .id // empty')
        if [[ -z "$RUN_ID" ]]; then
          echo "::error::Failed to submit run. Response: $RESPONSE"
          exit 1
        fi

        echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
        echo "::notice::Run submitted: $RUN_ID"

        # Optionally poll for completion
        if [[ "$WAIT" == "true" ]]; then
          START=$(date +%s)
          while true; do
            NOW=$(date +%s)
            if (( NOW - START > TIMEOUT )); then
              echo "::warning::Timeout waiting for run $RUN_ID"
              echo "status=timeout" >> "$GITHUB_OUTPUT"
              break
            fi

            STATUS_RESP=$(curl -s -X GET \
              -H "Authorization: Bearer $API_KEY" \
              "$SERVER/api/uar/runs/$RUN_ID")

            STATUS=$(echo "$STATUS_RESP" | jq -r '.status // "unknown"')
            if [[ "$STATUS" == "completed" || "$STATUS" == "failed" ]]; then
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              echo "$STATUS_RESP" | jq '.' > "$RUNNER_TEMP/uar_result.json"
              echo "result-json=$(cat $RUNNER_TEMP/uar_result.json)" >> "$GITHUB_OUTPUT"
              if [[ "$STATUS" == "failed" ]]; then
                echo "::error::Run $RUN_ID failed"
                cat "$RUNNER_TEMP/uar_result.json" | jq -r '.error // .errors[]? // "Unknown error"'
                exit 1
              fi
              echo "::notice::Run $RUN_ID completed successfully"
              break
            fi

            sleep 5
          done
        else
          echo "status=submitted" >> "$GITHUB_OUTPUT"
          echo "result-json=$RESPONSE" >> "$GITHUB_OUTPUT"
        fi

name: Runtime Governance

on:
  push:
  pull_request:

jobs:
  runtime-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run replay governance tests
        run: |
          pytest tests/test_replay_certificate.py
          pytest tests/test_replay_drift_comparator.py

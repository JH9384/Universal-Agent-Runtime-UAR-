name: burnin-hardening

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 4 * * *'  # Daily at 04:00 UTC

jobs:
  hardening:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run hardening tests
        run: |
          pytest tests/hardening -q --tb=short

      - name: Run ordering stress test (5 random seeds)
        run: |
          for seed in 1 2 3 7 42; do
            echo "=== Randomly seed=$seed ==="
            pytest tests/ --ignore=tests/conformance/test_invariants.py \
              -q --tb=line --timeout=60 --randomly-seed=$seed || exit 1
          done

      - name: Run gate target
        run: |
          make gate PYTHON=python

      - name: Run burn-in probe
        run: |
          python scripts/hardening/burnin_probe.py

      - name: Upload burn-in artifacts
        uses: actions/upload-artifact@v4
        with:
          name: burnin-artifacts
          path: artifacts/hardening

name: UAR CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Validate backend
        run: make validate PYTHON=python

      - name: Lint backend
        run: make lint-py PYTHON=python

      - name: Check release version alignment
        run: make check-version PYTHON=python

      - name: Validate UOR artifacts
        run: make validate-uor PYTHON=python

      - name: Run benchmark (non-blocking)
        run: |
          .venv/bin/python tests/benchmark_skills.py || true
        continue-on-error: true

  optional-dependency-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: ['advanced', 'doc-processing', 'agent-orchestration']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install optional dependency group
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,${{ matrix.extra }}]"

      - name: Import optional integration modules
        run: |
          python - <<'PY'
          import importlib

          modules = {
              "advanced": ["crewai", "dagster", "neo4j"],
              "doc-processing": ["unstructured", "docling"],
              "agent-orchestration": ["crewai"],
          }
          for module in modules["${{ matrix.extra }}"]:
              importlib.import_module(module)
              print(f"Imported {module}")
          PY

  web-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

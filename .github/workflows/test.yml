name: UAR Validation

on:
  workflow_dispatch:
    inputs:
      validation_scope:
        description: 'Validation scope to run'
        required: true
        default: 'foundation'
        type: choice
        options:
          - foundation
  push:
    branches:
      - main
      - uar-modular-runtime-v1
  pull_request:
    branches:
      - main

jobs:
  python-tests:
    name: Foundation Python Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run pytest (foundation scope)
        run: make validate PYTHON=python

  web-build:
    name: Staged Web Build Signal
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app (non-blocking staged UI signal)
        run: npm run build

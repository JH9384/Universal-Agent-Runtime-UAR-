name: Runtime Governance

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
      - feature/**

jobs:
  runtime-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Replay certification tests
        run: |
          pytest tests/test_replay_certification.py -q

      - name: Runtime governance validation
        run: |
          python scripts/validate_runtime_governance.py

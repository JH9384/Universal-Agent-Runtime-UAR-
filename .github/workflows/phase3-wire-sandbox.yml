name: Phase 3 Wire Sandbox

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@v4
        with:
          ref: recovery/modular-backend-hardening
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run guarded sandbox wiring script
        run: python scripts/phase3_wire_sandbox.py

      - name: Verify diff is minimal
        shell: bash
        run: |
          set -euo pipefail
          git diff -- apps/api-python/main.py
          changed=$(git diff --numstat -- apps/api-python/main.py | awk '{print $1 + $2}')
          changed=${changed:-0}
          if (( changed > 4 )); then
            echo "Unexpectedly large main.py diff: $changed changed lines"
            exit 1
          fi

      - name: Install dependencies
        working-directory: apps/api-python
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest requests

      - name: Run unit tests
        working-directory: apps/api-python
        run: pytest tests

      - name: Smoke test app import
        working-directory: apps/api-python
        run: |
          python - << 'EOF'
          import main
          assert main.app is not None
          print('App import OK')
          EOF

      - name: Commit sandbox wiring
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No sandbox wiring changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api-python/main.py
          git commit -m "Phase 3: wire sandbox module safely"
          git push origin HEAD:recovery/modular-backend-hardening

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "universal-agent-runtime"
version = "0.1.0"
description = "Universal Agnostic Runtime for modular goal-driven agent execution."
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110,<1.0",
  "uvicorn>=0.27,<1.0",
  "httpx>=0.27,<1.0",
  "pydantic>=2.0,<3.0",
  "pypdf>=4.0",
  "python-docx>=1.1",
  "openpyxl>=3.1",
  "nbformat>=5.9",
  "pandas>=2.0",
  "pyarrow>=14.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0,<9.0", 
  "httpx>=0.27,<1.0",
  "pytest-asyncio>=0.23,<1.0",
  "pytest-cov>=4.0,<5.0",
  "ruff>=0.1,<1.0",
  "mypy>=1.0,<2.0",
]

[tool.setuptools.packages.find]
include = ["uar*"]
exclude = ["apps*", "tests*", "docs*", "specs*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100

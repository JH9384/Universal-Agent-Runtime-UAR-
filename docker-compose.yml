# Local development Docker Compose for UAR
# Usage:
#   docker-compose up --build
#
# For production, use docker-compose.prod.yml instead.

version: '3.8'

services:
  uar-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=true
      - LOG_LEVEL=debug
      - RATE_LIMIT_ENABLED=false
      - API_KEYS=dev-key-12345:developer:authenticated
    volumes:
      - ./runs:/var/lib/uar/runs
      - ./logs:/var/log/uar
      - .:/app
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s

  uar-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://uar-api:8000
    depends_on:
      uar-api:
        condition: service_healthy
    profiles:
      - web

  uar-dashboard:
    build:
      context: ./apps/operator-dashboard
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://uar-api:8000
    depends_on:
      uar-api:
        condition: service_healthy
    profiles:
      - dashboard

  # Optional: Redis for rate limiting in dev
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    profiles:
      - redis
